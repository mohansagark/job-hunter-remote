schema: spec-driven

context: |
  Project: autopilot-jobhunt — an AI job agent. Discovers jobs via TinyFish,
  scores each against the candidate's resume with an LLM (OpenRouter, 0-100),
  and pushes top matches to Telegram. Runs nightly via GitHub Actions.
  Tech stack: Python 3.13; package job_hunt/ (scanner, drafter, notifier,
  llm_utils, profile_sync, send_digest, main CLI, mcp_server).
  Profile is rebuilt each run from the mohansagark/portfolio-data repo
  (data/*.json) via job_hunt/profile_sync.py.
  Conventions: ruff + mypy + pytest with an 85% coverage gate (CI enforces all
  three); tests mock job_hunt.llm_utils.chat_with_llm — no real network/LLM in
  tests. GitHub Actions workflow YAML must be pure ASCII (GitHub silently fails
  to register workflows containing non-ASCII bytes; emit emojis via printf).
  Secrets live in .env locally and GitHub Actions secrets in CI, never committed.

